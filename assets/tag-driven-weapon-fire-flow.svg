<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="0.52" stop-color="#f7efe2"/>
      <stop offset="1" stop-color="#ff8a34"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5a00"/>
      <stop offset="1" stop-color="#b83a00"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#1e1a17" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1a17"/>
    </marker>
    <style>
      .display { font-family: Inter, Arial, sans-serif; font-weight: 900; letter-spacing: -2px; fill: #1e1a17; }
      .mono { font-family: "JetBrains Mono", Consolas, monospace; font-weight: 700; letter-spacing: 2px; fill: #b83a00; }
      .body { font-family: Inter, Arial, sans-serif; font-weight: 600; fill: #3b332f; }
      .small { font-family: Inter, Arial, sans-serif; font-weight: 500; fill: #5d514b; }
      .card-title { font-family: Inter, Arial, sans-serif; font-weight: 900; fill: #1e1a17; }
      .card-sub { font-family: Inter, Arial, sans-serif; font-weight: 600; fill: #4c423d; }
      .code { font-family: "JetBrains Mono", Consolas, monospace; font-weight: 700; fill: #1e1a17; }
      .label { font-family: "JetBrains Mono", Consolas, monospace; font-weight: 800; letter-spacing: 1.5px; fill: #fffdf7; }
      .line { stroke: #1e1a17; stroke-width: 4; fill: none; marker-end: url(#arrow); opacity: 0.82; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect x="0" y="0" width="1920" height="18" fill="#ff5a00"/>
  <rect x="0" y="875" width="1920" height="205" fill="#88cfc7" opacity="0.7"/>

  <text x="90" y="92" class="mono" font-size="24">WHIPLASH // CUSTOM GAS-STYLE SYSTEM</text>
  <text x="90" y="160" class="display" font-size="72">Tag-Driven Weapon Fire Ability</text>
  <text x="94" y="205" class="body" font-size="28">Input requests an ability tag. Tags gate execution. Weapon data drives runtime behavior.</text>

  <g filter="url(#softShadow)">
    <rect x="90" y="270" width="430" height="600" rx="22" fill="#fffdf7" stroke="#e7d8c8" stroke-width="3"/>
    <rect x="90" y="270" width="430" height="70" rx="22" fill="url(#hero)"/>
    <text x="120" y="315" class="label" font-size="22">01 INPUT LAYER</text>

    <rect x="125" y="385" width="360" height="88" rx="14" fill="#f7efe2" stroke="#e1cbbb" stroke-width="2"/>
    <text x="150" y="420" class="card-title" font-size="25">AWPlayerController</text>
    <text x="150" y="452" class="card-sub" font-size="20">Receives Enhanced Input</text>

    <line x1="305" y1="486" x2="305" y2="530" class="line"/>

    <rect x="125" y="542" width="360" height="96" rx="14" fill="#f7efe2" stroke="#e1cbbb" stroke-width="2"/>
    <text x="150" y="579" class="card-title" font-size="24">OnShootInputAction</text>
    <text x="150" y="611" class="card-sub" font-size="20">Pressed or released bool</text>

    <line x1="305" y1="651" x2="305" y2="695" class="line"/>

    <rect x="125" y="708" width="360" height="118" rx="14" fill="#1e1a17"/>
    <text x="150" y="746" class="code" font-size="21" fill="#fffdf7">Pressed:</text>
    <text x="150" y="779" class="code" font-size="20" fill="#fffdf7">StartAbilityByTag</text>
    <text x="150" y="812" class="code" font-size="20" fill="#ff8a34">Ability.Action.Shoot</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="610" y="270" width="500" height="600" rx="22" fill="#fffdf7" stroke="#e7d8c8" stroke-width="3"/>
    <rect x="610" y="270" width="500" height="70" rx="22" fill="#88cfc7"/>
    <text x="640" y="315" class="label" font-size="22" fill="#1e1a17">02 ABILITY GATE</text>

    <rect x="650" y="382" width="420" height="92" rx="14" fill="#f7efe2" stroke="#e1cbbb" stroke-width="2"/>
    <text x="675" y="418" class="card-title" font-size="24">UWAbilityComponent</text>
    <text x="675" y="450" class="card-sub" font-size="20">Finds ability matching AbilityTag</text>

    <line x1="860" y1="486" x2="860" y2="526" class="line"/>

    <rect x="650" y="540" width="420" height="128" rx="14" fill="#f7efe2" stroke="#e1cbbb" stroke-width="2"/>
    <text x="675" y="578" class="card-title" font-size="24">UWAbility::CanStart()</text>
    <text x="675" y="611" class="card-sub" font-size="20">Rejects if already running</text>
    <text x="675" y="641" class="card-sub" font-size="20">or if BlockedTags are active</text>

    <line x1="860" y1="681" x2="860" y2="721" class="line"/>

    <rect x="650" y="735" width="420" height="90" rx="14" fill="#b83a00"/>
    <text x="675" y="772" class="label" font-size="20">BLOCKED BY TAGS</text>
    <text x="675" y="806" class="code" font-size="20" fill="#fffdf7">Dead / Stunned / Reloading</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1200" y="270" width="630" height="600" rx="22" fill="#fffdf7" stroke="#e7d8c8" stroke-width="3"/>
    <rect x="1200" y="270" width="630" height="70" rx="22" fill="url(#hero)"/>
    <text x="1230" y="315" class="label" font-size="22">03 FIRE EXECUTION</text>

    <rect x="1240" y="382" width="550" height="86" rx="14" fill="#f7efe2" stroke="#e1cbbb" stroke-width="2"/>
    <text x="1265" y="417" class="card-title" font-size="24">UWAbility_WeaponFire::CanStart()</text>
    <text x="1265" y="449" class="card-sub" font-size="20">Weapon exists, ammo exists, fire interval passed</text>

    <line x1="1515" y1="480" x2="1515" y2="518" class="line"/>

    <rect x="1240" y="532" width="550" height="92" rx="14" fill="#f7efe2" stroke="#e1cbbb" stroke-width="2"/>
    <text x="1265" y="568" class="card-title" font-size="24">StartAbility()</text>
    <text x="1265" y="600" class="card-sub" font-size="20">Adds State.Firing and starts RPM timer if automatic</text>

    <line x1="1515" y1="636" x2="1515" y2="674" class="line"/>

    <rect x="1240" y="688" width="550" height="140" rx="14" fill="#1e1a17"/>
    <text x="1265" y="727" class="code" font-size="22" fill="#fffdf7">FireOnce()</text>
    <text x="1265" y="762" class="code" font-size="20" fill="#ff8a34">WeaponState->Fire()</text>
    <text x="1265" y="794" class="code" font-size="20" fill="#fffdf7">Camera aim -> muzzle trace -> spread</text>
    <text x="1265" y="824" class="code" font-size="20" fill="#fffdf7">recoil + fire montage</text>
  </g>

  <line x1="522" y1="568" x2="608" y2="568" class="line"/>
  <line x1="1112" y1="568" x2="1198" y2="568" class="line"/>

  <g>
    <rect x="690" y="915" width="640" height="70" rx="35" fill="#1e1a17" opacity="0.94"/>
    <text x="735" y="959" class="label" font-size="22">STOP: clear timer, remove State.Firing, release cached weapon state</text>
  </g>
</svg>
